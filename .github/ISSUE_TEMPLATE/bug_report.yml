name: Bug Report
description: Report a defect in a Commaleon service
title: ""
labels: [type:bug]
projects: ["Commaleon/24"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Use an **imperative title** describing the fix, e.g. "Fix 500 on empty cart checkout" â€” not "checkout broken".
        Keep the title free of bracket metadata; set Service, Priority, and Version on the project board instead.
  - type: dropdown
    id: service
    attributes:
      label: Service
      description: Which service is affected?
      options:
        - CRM
        - PIM
        - PUR
        - SHIP
        - OMS
        - Fulfillment
        - Shop
        - WMS
        - SDM
        - DevOps & General
        - TIME
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this?
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps to trigger the bug.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include logs, stack traces, or error codes if available.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment / URL
      description: Environment (dev, prod) and the URL or endpoint where the bug occurred.
      placeholder: dev â€” https://...
    validations:
      required: false
  - type: checkboxes
    id: search
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
