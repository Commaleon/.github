name: Bug Report
description: Report a defect in a Commaleon service
labels:
  - "type:bug"
projects:
  - "Commaleon/24"
body:
  - type: markdown
    attributes:
      value: "Use an imperative title describing the fix. Set Service, Priority, and Version on the board."
  - type: dropdown
    id: service
    attributes:
      label: Service
      options:
        - CRM
        - PIM
        - PUR
        - SHIP
        - OMS
        - Fulfillment
        - Shop
        - WMS
        - SDM
        - "DevOps & General"
        - TIME
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
