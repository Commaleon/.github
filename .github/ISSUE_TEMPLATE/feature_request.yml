name: Feature Request
description: Propose a new capability or enhancement for a Commaleon service
title: ""
labels: [type:feature]
projects: ["Commaleon/24"]
body:
  - type: markdown
    attributes:
      value: |
        Use an **imperative title** naming the outcome, e.g. "Add bulk import to product grid" â€” not "bulk import would be nice".
        Keep the title free of bracket metadata; set Service, Priority, and Version on the project board instead.
  - type: dropdown
    id: service
    attributes:
      label: Service
      description: Which service does this feature belong to?
      options:
        - CRM
        - PIM
        - PUR
        - SHIP
        - OMS
        - Fulfillment
        - Shop
        - WMS
        - SDM
        - DevOps & General
        - TIME
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / why
      description: What problem does this solve, and why does it matter now?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the capability you want and how it should behave.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete, testable conditions that must hold for this to be Done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they were not chosen.
    validations:
      required: false
