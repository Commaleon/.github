name: Feature Request
description: Propose a new capability or enhancement for a Commaleon service
labels:
  - "type:feature"
projects:
  - "Commaleon/24"
body:
  - type: markdown
    attributes:
      value: "Use an imperative title naming the outcome. Set Service, Priority, and Version on the board."
  - type: dropdown
    id: service
    attributes:
      label: Service
      options:
        - CRM
        - PIM
        - PUR
        - SHIP
        - OMS
        - Fulfillment
        - Shop
        - WMS
        - SDM
        - "DevOps & General"
        - TIME
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / why
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
