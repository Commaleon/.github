name: Research / Refactor
description: Investigate a question or plan a refactor with no user-facing change
labels:
  - "type:refactor"
projects:
  - "Commaleon/24"
body:
  - type: markdown
    attributes:
      value: "Use an imperative title naming the investigation or refactor. Set Service and Version on the board."
  - type: dropdown
    id: service
    attributes:
      label: Service
      options:
        - CRM
        - PIM
        - PUR
        - SHIP
        - OMS
        - Fulfillment
        - Shop
        - WMS
        - SDM
        - "DevOps & General"
        - TIME
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question or goal
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / boundaries
    validations:
      required: false
  - type: textarea
    id: output
    attributes:
      label: Expected output / decision
    validations:
      required: true
