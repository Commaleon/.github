name: Design Task
description: Design or redesign UI, UX, or a visual system for a Commaleon service
labels:
  - "type:design"
projects:
  - "Commaleon/24"
body:
  - type: markdown
    attributes:
      value: "Use an imperative title naming the design outcome. Set Service and Version on the board."
  - type: dropdown
    id: service
    attributes:
      label: Service
      options:
        - CRM
        - PIM
        - PUR
        - SHIP
        - OMS
        - Fulfillment
        - Shop
        - WMS
        - SDM
        - "DevOps & General"
        - TIME
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired behaviour
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and current behaviour
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: References / screenshots
    validations:
      required: false
